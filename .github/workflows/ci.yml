name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Type check server
        run: npm run type-check:server

      - name: Type check tests
        run: npm run type-check:tests

      - name: Type check client
        run: npm run type-check:client

      - name: Lint server
        run: npm run lint:server

      - name: Lint client
        run: npm run lint:client

      - name: Security route tests
        run: npm run test:security -- --runInBand

      - name: Server route and service tests
        run: npm run test:routes -- --runInBand && npm run test:services -- --runInBand

      - name: E2E smoke tests
        run: npm run test:e2e -- --runInBand

      - name: Server coverage
        run: npm run test:coverage -- --runInBand

      - name: Client tests
        run: npm run test
        working-directory: client

      - name: Client coverage
        run: npm run coverage
        working-directory: client

      - name: Client accessibility checks
        run: npm run a11y
        working-directory: client

      - name: Packaging smoke
        run: npm run smoke:package
